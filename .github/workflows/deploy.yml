name: Deploy LegacyShield

on:
  push:
    branches: [main]

# One deploy at a time — two overlapping SSH sessions race on the build dir
# and pm2. Newer push wins; in-flight deploy is cancelled.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # Default command_timeout is 10m; the web build now prerenders 650+
          # static pages (grows ~6/day) and overran it, killing the deploy
          # mid-build so nothing shipped. ponytail: bump the ceiling — revisit
          # with ISR/on-demand rendering if page count keeps climbing.
          command_timeout: "30m"
          script: |
            # NOTE: deliberately not using `set -e` — prior deploys have been
            # silently tolerating a prisma migrate warning ("DATABASE_URL not
            # found" reading the host env, although migrations are also run
            # inside the API container at startup). The storage gate below
            # has its own explicit `exit 1`, which is what we actually need.
            set -o pipefail
            cd /opt/legacyshield/app
            git fetch origin main && git reset --hard origin/main
            npm ci --workspace=@legacy-shield/web --workspace=@legacy-shield/api --workspace=@legacy-shield/shared

            # API & DB
            cd packages/api && npx prisma migrate deploy
            cd /opt/legacyshield

            # One-time transition: if ls-legacy-minio exists as a free-standing
            # container (no compose project label), remove it so compose can
            # take ownership on the next up. The legacyshield_minio_data volume
            # is preserved — only the container is replaced. Idempotent: after
            # the first deploy, the container has compose labels and this
            # block becomes a no-op.
            if docker inspect ls-legacy-minio >/dev/null 2>&1; then
              ls_owner=$(docker inspect ls-legacy-minio --format '{{ index .Config.Labels "com.docker.compose.project" }}' 2>/dev/null || true)
              if [ -z "$ls_owner" ]; then
                echo "Removing free-standing ls-legacy-minio so compose can take over…"
                docker rm -f ls-legacy-minio
              fi
            fi

            docker compose \
              --env-file /opt/legacyshield/.env.prod \
              -f docker-compose.prod.yml \
              -f /opt/legacyshield/app/infrastructure/legacy-minio.compose.yml \
              up -d --build api ls-legacy-minio

            # ----- API storage gate -----
            # Poll the public storage probe until it reports reachable: true,
            # or fail the deploy after 60s. Catches bucket / endpoint /
            # credential drift at deploy time instead of after a user clicks
            # download.
            echo "Verifying API storage reachability…"
            for i in $(seq 1 12); do
              body=$(curl -fsS --max-time 5 "https://api.legacyshield.eu/api/v1/health/storage" || true)
              if [ -n "$body" ] && echo "$body" | grep -q '"reachable":true'; then
                echo "✓ Storage reachable: $body"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "✗ Storage NOT reachable after 60s. Last response: $body"
                docker logs --tail 80 legacyshield-api-1 || true
                exit 1
              fi
              sleep 5
            done

            # Web (Standalone Build)
            cd /opt/legacyshield/app/packages/web
            # Keep .next/cache so Next re-renders only changed pages instead of
            # all 650+ every deploy (that's what overran the timeout). Wipe
            # everything else for a clean standalone output.
            find .next -mindepth 1 -maxdepth 1 ! -name cache -exec rm -rf {} + 2>/dev/null || true
            NEXT_PUBLIC_API_URL=https://api.legacyshield.eu npm run build

            # Prepare Standalone output
            mkdir -p .next/standalone/packages/web/.next
            cp -r .next/static .next/standalone/packages/web/.next/static
            cp -r public .next/standalone/packages/web/public 2>/dev/null || true
            # Blog reads content/blog at runtime (next-intl renders [locale] pages
            # dynamically); standalone doesn't bundle it, so copy it in or the blog
            # and sitemap come up empty.
            cp -r content .next/standalone/packages/web/content

            # Restart with PM2
            cd .next/standalone/packages/web
            PORT=3000 pm2 delete legacyshield-web 2>/dev/null || true
            PORT=3000 pm2 start server.js --name legacyshield-web
            pm2 save
